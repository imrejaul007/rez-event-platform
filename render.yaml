services:
  - type: web
    name: rez-event-platform
    runtime: node
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4008"
      - key: HEALTH_PORT
        value: "4108"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKENS_JSON
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: REZ_ACTION_ENGINE_URL
        sync: false
      - key: REZ_FEEDBACK_SERVICE_URL
        sync: false
